<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c96f4a" />
    <meta
      name="description"
      content="Soleil — suivi quotidien des symptômes pour le syndrome d'Ehlers-Danlos hypermobile (SEDh). 100% local, aucune donnée envoyée à un serveur."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Soleil — suivi SEDh</title>
    <script>
      // Applique le thème avant le premier rendu, pour éviter un flash de
      // thème clair chez qui préfère le sombre (voir src/lib/theme.ts).
      (function () {
        try {
          var pref = localStorage.getItem("soleil-theme");
          var sombre = pref === "sombre" || (pref !== "clair" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", sombre ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
